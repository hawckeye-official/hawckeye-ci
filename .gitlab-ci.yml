# Publishes this project to the GitLab CI/CD Catalog on each version tag.
# Prereq: Settings → General → Visibility → enable "CI/CD Catalog resource".
include:
  - component: $CI_SERVER_FQDN/components/sast/sast@main
    rules:
      - when: never        # placeholder; remove. Self-test the component below instead.

stages:
  - test
  - release

# Validate the component template parses on every push.
lint-component:
  stage: test
  image: alpine:3.20
  script:
    - apk add --no-cache yq >/dev/null
    - yq e '.spec.inputs' templates/scan.yml >/dev/null && echo "component spec OK"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Create the catalog release. Triggered by pushing a semver tag like v1.0.0.
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Releasing $CI_COMMIT_TAG to the CI/CD Catalog"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Hawckeye CI $CI_COMMIT_TAG"
    description: "Hawckeye autonomous security, QA & product-friction trigger — GitLab CI/CD component."
