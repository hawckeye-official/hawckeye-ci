# Drop this in a consumer repo at .github/workflows/hawkeye.yml
name: Hawkeye Pentest
on:
  pull_request:

permissions:
  pull-requests: write   # to post the report comment
  contents: read

jobs:
  hawkeye:
    runs-on: ubuntu-latest
    steps:
      # URL target:
      - uses: your-org/hawkeye-ci@v1
        with:
          token: ${{ secrets.HAWKEYE_TOKEN }}
          asset-id: "as_9f3c..."        # registered authorized target
          # fail-on: high               # uncomment to gate the build

      # APK target (alternative): build the apk first, then point at the file
