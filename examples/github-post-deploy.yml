# Run Hawckeye AFTER deploying to a test/staging environment.
# Uses the readiness gate so a slow (e.g. 10-min) deploy is handled without a timer.
# Results go to your Hawckeye dashboard, Linear, and email — not the PR.
name: Hawckeye
on:
  push:
    branches: [main]          # post-merge: deploy, then scan the deployed env

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - id: deploy
        run: |
          # ...kick off your deploy (may be async — that's fine, see wait-for-url below)...
          echo "url=https://staging.my-app.com" >> "$GITHUB_OUTPUT"

  hawckeye:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: hawckeye-official/hawckeye-ci@v1
        with:
          api-key: ${{ secrets.HAWKEYE_API_KEY }}
          environment-url: ${{ needs.deploy.outputs.url }}   # must be within that asset's domain
          scans: security,qa,friction
          wait-for-url: true            # poll until the env is live...
          version-path: /version        # ...and serving THIS commit (no magic timer)
          # expected-ref defaults to the workflow sha
          ready-timeout: "900"          # give the deploy up to 15 min
