# Consumer pipeline (Azure DevOps). Run Hawckeye AFTER deploy to a test env.
# Define a secret variable HAWKEYE_API_KEY. Linux agent required (bash/curl/jq).
trigger:
  - main

pool:
  vmImage: ubuntu-latest

resources:
  repositories:
    - repository: hawckeye
      type: github          # or 'git' for Azure Repos
      name: hawckeye-official/hawckeye-ci
      endpoint: your-github-service-connection
      ref: refs/tags/v1

steps:
  # ...your deploy steps here, producing the test env URL...
  - template: azure/hawkeye-steps.yml@hawckeye
    parameters:
      environmentUrl: 'https://staging.my-app.com'   # must be within that asset's domain
