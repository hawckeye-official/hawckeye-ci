# Hawckeye — Azure Pipelines steps template. Run AFTER a deploy to a test env.
# Results go to your dashboard, Linear, and email — not the PR. Linux agent.
#
#   resources:
#     repositories:
#       - repository: hawckeye
#         type: github
#         name: hawckeye-official/hawckeye-ci
#         ref: refs/tags/v1
#   steps:
#     - template: azure/hawkeye-steps.yml@hawckeye
#       parameters:
#         environmentUrl: 'https://staging.my-app.com'   # or assetId / apk
#
# Define a secret variable HAWKEYE_TOKEN on the pipeline.
parameters:
  - name: environmentUrl
    type: string
    default: ''
  - name: assetId
    type: string
    default: ''
  - name: apk
    type: string
    default: ''
  - name: scans
    type: string
    default: 'security,qa,friction'
  - name: apiUrl
    type: string
    default: 'https://api.hawckeye.com'
  - name: wait
    type: string
    default: 'false'
  - name: clientRef
    type: string
    default: 'v1'
  - name: clientBase
    type: string
    default: 'https://raw.githubusercontent.com/hawckeye-official/hawckeye-ci'

steps:
  - bash: |
      set -euo pipefail
      command -v jq >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq jq)
      mkdir -p .hawkeye
      curl -fsSL "${{ parameters.clientBase }}/${{ parameters.clientRef }}/scripts/hawkeye-core.sh" -o .hawkeye/core.sh
      bash .hawkeye/core.sh
    displayName: 'Hawckeye'
    env:
      HAWKEYE_API: ${{ parameters.apiUrl }}
      HAWKEYE_TOKEN: $(HAWKEYE_TOKEN)
      HAWKEYE_ENVIRONMENT_URL: ${{ parameters.environmentUrl }}
      HAWKEYE_ASSET_ID: ${{ parameters.assetId }}
      HAWKEYE_APK: ${{ parameters.apk }}
      HAWKEYE_SCANS: ${{ parameters.scans }}
      HAWKEYE_WAIT: ${{ parameters.wait }}
      HAWKEYE_REF: $(Build.SourceVersion)
