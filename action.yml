name: "Hawckeye"
description: "Autonomously tests an authorized URL or APK for security, QA, and product-friction issues after deploy. Fire-and-forget; results go to your dashboard, Linear, and email."
author: "Hawckeye"
branding:
  icon: "shield"
  color: "purple"

inputs:
  token:
    description: "Hawckeye API key (store as a repo/org secret)."
    required: true
  environment-url:
    description: "Freshly-deployed test/staging URL to scan (web). Use this OR asset-id OR apk."
    required: false
    default: ""
  asset-id:
    description: "Registered authorized asset id. Use this OR environment-url OR apk."
    required: false
    default: ""
  apk:
    description: "Path to an APK artifact to scan (mobile). Use this OR environment-url OR asset-id."
    required: false
    default: ""
  scans:
    description: "Comma list of suites to run: security,qa,friction (default all)."
    required: false
    default: "security,qa,friction"
  api-url:
    description: "Hawckeye API base URL."
    required: false
    default: "https://api.hawckeye.com"
  wait:
    description: "Wait for the scan to finish so the job reflects status (default false = fire-and-forget)."
    required: false
    default: "false"
  timeout:
    description: "Max seconds to wait when wait=true."
    required: false
    default: "1800"
  wait-for-url:
    description: "Poll environment-url until it's live before scanning (handles slow deploys)."
    required: false
    default: "false"
  expected-ref:
    description: "Commit sha the env must report (via version-path) before scanning. Defaults to the workflow sha."
    required: false
    default: ${{ github.sha }}
  version-path:
    description: "Path on the env returning the deployed sha (e.g. /version). Health-check only if unset."
    required: false
    default: ""
  ready-timeout:
    description: "Max seconds to wait for the env to become ready."
    required: false
    default: "600"

outputs:
  scan-id:
    description: "The Hawckeye scan id."
    value: ${{ steps.scan.outputs.scan_id }}
  status:
    description: "Scan status (queued unless wait=true)."
    value: ${{ steps.scan.outputs.status }}
  dashboard-url:
    description: "Where to watch/inspect this scan."
    value: ${{ steps.scan.outputs.dashboard_url }}

runs:
  using: "composite"
  steps:
    - id: scan
      shell: bash
      env:
        HAWKEYE_API: ${{ inputs.api-url }}
        HAWKEYE_TOKEN: ${{ inputs.token }}
        HAWKEYE_ENVIRONMENT_URL: ${{ inputs.environment-url }}
        HAWKEYE_ASSET_ID: ${{ inputs.asset-id }}
        HAWKEYE_APK: ${{ inputs.apk }}
        HAWKEYE_SCANS: ${{ inputs.scans }}
        HAWKEYE_WAIT: ${{ inputs.wait }}
        HAWKEYE_TIMEOUT: ${{ inputs.timeout }}
        HAWKEYE_WAIT_FOR_URL: ${{ inputs.wait-for-url }}
        HAWKEYE_EXPECTED_REF: ${{ inputs.expected-ref }}
        HAWKEYE_VERSION_PATH: ${{ inputs.version-path }}
        HAWKEYE_READY_TIMEOUT: ${{ inputs.ready-timeout }}
        HAWKEYE_REF: ${{ github.sha }}
        HAWKEYE_METADATA: >-
          {"branch":"${{ github.ref_name }}","actor":"${{ github.actor }}","repo":"${{ github.repository }}","run_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
      run: bash "${{ github.action_path }}/scripts/hawkeye-core.sh"
