# Hawckeye — GitLab CI/CD Component. Run AFTER a deploy to a test/staging env.
# Results go to your dashboard, Linear, and email — not the MR.
#
#   include:
#     - component: $CI_SERVER_FQDN/hawckeye-official/hawckeye-ci/scan@1
#       inputs:
#         environment-url: "https://staging.my-app.com"   # or asset-id / apk
#
# Set CI/CD variable HAWKEYE_TOKEN (masked).
spec:
  inputs:
    environment-url:
      default: ""
      description: "Freshly-deployed environment to scan (web). Use this OR asset-id OR apk."
    asset-id:
      default: ""
    apk:
      default: ""
    scans:
      default: "security,qa,friction"
    api-url:
      default: "https://api.hawckeye.com"
    wait:
      default: "false"
    wait-for-url:
      default: "false"
      description: "Poll environment-url until live before scanning."
    expected-ref:
      default: ""
      description: "Commit sha the env must report before scanning (defaults to CI_COMMIT_SHA at runtime)."
    version-path:
      default: ""
      description: "Path returning the deployed sha, e.g. /version."
    stage:
      default: "scan"
    image:
      default: "alpine:3.20"
    client-ref:
      default: "v1"
    client-base:
      default: "https://gitlab.com/hawckeye-official/hawckeye-ci/-/raw"
---
hawckeye:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    HAWKEYE_API: "$[[ inputs.api-url ]]"
    HAWKEYE_ENVIRONMENT_URL: "$[[ inputs.environment-url ]]"
    HAWKEYE_ASSET_ID: "$[[ inputs.asset-id ]]"
    HAWKEYE_APK: "$[[ inputs.apk ]]"
    HAWKEYE_SCANS: "$[[ inputs.scans ]]"
    HAWKEYE_WAIT: "$[[ inputs.wait ]]"
    HAWKEYE_WAIT_FOR_URL: "$[[ inputs.wait-for-url ]]"
    HAWKEYE_EXPECTED_REF: "$[[ inputs.expected-ref ]]"
    HAWKEYE_VERSION_PATH: "$[[ inputs.version-path ]]"
    HAWKEYE_REF: "$CI_COMMIT_SHA"
    HAWKEYE_METADATA: '{"branch":"$CI_COMMIT_BRANCH","actor":"$GITLAB_USER_LOGIN","project":"$CI_PROJECT_PATH","run_url":"$CI_PIPELINE_URL"}'
    CLIENT_URL: "$[[ inputs.client-base ]]/$[[ inputs.client-ref ]]/scripts"
  before_script:
    - command -v jq >/dev/null || apk add --no-cache bash curl jq >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq bash curl jq)
    - mkdir -p .hawkeye
    - curl -fsSL "$CLIENT_URL/hawkeye-core.sh" -o .hawkeye/core.sh
    - chmod +x .hawkeye/core.sh
  script:
    - bash .hawkeye/core.sh
  artifacts:
    when: always
    paths:
      - hawkeye-scan-id.txt
